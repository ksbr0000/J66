<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner">

    <a class="brand" href="#">
      <span class="brand-icon">J</span>
      <span class="brand-text">Julius<span class="brand-accent">66</span></span>
    </a>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        class="search-input"
        type="text"
        placeholder="Search services, solutions..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
      />
      <kbd class="search-kbd">⌘K</kbd>
    </div>

    <div class="nav-actions">
      <button class="btn-ghost">Login</button>
      <button class="btn-primary">Get Started</button>
      <button class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (theme.isDark()) {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen()">
    <div class="mobile-search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" type="text" placeholder="Search..." />
    </div>
    <div class="mobile-links">
      <a href="#" (click)="closeMenu()">Services</a>
      <a href="#" (click)="closeMenu()">Case Studies</a>
      <a href="#" (click)="closeMenu()">About</a>
      <a href="#" (click)="closeMenu()">Contact</a>
    </div>
    <div class="mobile-ctas">
      <button class="btn-ghost full" (click)="closeMenu()">Login</button>
      <button class="btn-primary full" (click)="closeMenu()">Get Started</button>
    </div>
  </div>
</nav>
